databaseChangeLog:
  - changeSet:
      id: create-table-sessions
      author: Alext_v
      changes:
        - createTable:
            tableName: sessions
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: datetime
                  constraints:
                    nullable: false